<div class="container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">Dashboard</div>
      <div class="brand-subtitle">Course Management</div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/" class="sidebar-link">Dashboard</a>
      <a routerLink="/courses" class="sidebar-link">Courses</a>
      <a routerLink="/users" class="sidebar-link">Users</a>
      <a routerLink="/assignments" class="sidebar-link">Assignments</a>
      <a routerLink="/enrollments" class="sidebar-link">Enrollments</a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/" fragment="login" class="sidebar-button" *ngIf="!isLoggedIn()">Login</a>
      <button type="button" class="sidebar-button logout" *ngIf="isLoggedIn()" (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
